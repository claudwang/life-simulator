<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 900px; width: 100%; padding: 40px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 30px; font-size: 2.5em; }
        #setup-view { display: block; }
        .points-info { text-align: center; margin-bottom: 30px; padding: 15px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 10px; }
        .points-info h2 { color: #667eea; font-size: 2em; }
        .attributes { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .attribute { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 2px solid #e9ecef; transition: all 0.3s; }
        .attribute:hover { border-color: #667eea; transform: translateY(-2px); }
        .attribute-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .attribute-name { font-size: 1.1em; font-weight: bold; color: #333; }
        .attribute-value { background: #667eea; color: white; padding: 5px 12px; border-radius: 15px; font-weight: bold; }
        .attribute-desc { color: #666; font-size: 0.85em; margin-bottom: 10px; }
        .attribute-controls { display: flex; justify-content: center; gap: 8px; }
        .btn-attr { width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 1.3em; cursor: pointer; transition: all 0.3s; }
        .btn-minus { background: #ff6b6b; color: white; }
        .btn-plus { background: #51cf66; color: white; }
        .btn-attr:hover:not(:disabled) { transform: scale(1.1); }
        .btn-attr:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-start { display: block; width: 100%; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 1.5em; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-start:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
        #simulation-view { display: none; }
        .life-summary { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding: 20px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        .life-summary h2 { color: #667eea; margin-bottom: 10px; }
        .life-summary .attributes-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .life-summary .attr-tag { background: white; padding: 6px 12px; border-radius: 15px; font-weight: bold; font-size: 0.9em; }
        .events-container { max-height: 500px; overflow-y: auto; margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; }
        .event { padding: 15px; margin-bottom: 12px; border-radius: 8px; border-left: 4px solid; animation: slideIn 0.5s ease-out; line-height: 1.7; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .event.positive { background: #d4edda; border-color: #28a745; }
        .event.negative { background: #f8d7da; border-color: #dc3545; }
        .event.neutral { background: #e2e3e5; border-color: #6c757d; }
        .event.death { background: #343a40; border-color: #000; color: white; }
        .event.career { background: #fff3cd; border-color: #ffc107; }
        .event .age { font-weight: bold; color: #667eea; margin-bottom: 8px; font-size: 1.1em; }
        .event.death .age { color: white; }
        .event.career .age { color: #856404; }
        .btn-restart { display: block; width: 100%; padding: 20px; background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); color: white; border: none; border-radius: 10px; font-size: 1.3em; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-restart:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(238,90,36,0.4); }
        .error-message { text-align: center; color: #dc3545; font-size: 1.2em; margin-top: 15px; }
        @media (max-width: 600px) { .container { padding: 20px; } h1 { font-size: 1.8em; } .attributes { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 人生模拟器</h1>
        <div id="setup-view">
            <div class="points-info">
                <h2>剩余点数: <span id="remaining-points">30</span></h2>
                <p>分配你的属性，决定人生走向</p>
            </div>
            <div class="attributes">
                <div class="attribute" data-attr="iq">
                    <div class="attribute-header"><span class="attribute-name">🧠 智商</span><span class="attribute-value" id="value-iq">0</span></div>
                    <div class="attribute-desc">影响学习能力、职业发展</div>
                    <div class="attribute-controls"><button class="btn-attr btn-minus" onclick="changeAttribute('iq', -1)">−</button><button class="btn-attr btn-plus" onclick="changeAttribute('iq', 1)">+</button></div>
                </div>
                <div class="attribute" data-attr="eq">
                    <div class="attribute-header"><span class="attribute-name">❤️ 情商</span><span class="attribute-value" id="value-eq">0</span></div>
                    <div class="attribute-desc">影响人际关系、感情生活</div>
                    <div class="attribute-controls"><button class="btn-attr btn-minus" onclick="changeAttribute('eq', -1)">−</button><button class="btn-attr btn-plus" onclick="changeAttribute('eq', 1)">+</button></div>
                </div>
                <div class="attribute" data-attr="physique">
                    <div class="attribute-header"><span class="attribute-name">💪 体能</span><span class="attribute-value" id="value-physique">0</span></div>
                    <div class="attribute-desc">影响健康、运动能力</div>
                    <div class="attribute-controls"><button class="btn-attr btn-minus" onclick="changeAttribute('physique', -1)">−</button><button class="btn-attr btn-plus" onclick="changeAttribute('physique', 1)">+</button></div>
                </div>
                <div class="attribute" data-attr="looks">
                    <div class="attribute-header"><span class="attribute-name">✨ 相貌</span><span class="attribute-value" id="value-looks">0</span></div>
                    <div class="attribute-desc">影响第一印象、社交优势</div>
                    <div class="attribute-controls"><button class="btn-attr btn-minus" onclick="changeAttribute('looks', -1)">−</button><button class="btn-attr btn-plus" onclick="changeAttribute('looks', 1)">+</button></div>
                </div>
                <div class="attribute" data-attr="wealth">
                    <div class="attribute-header"><span class="attribute-name">💰 家境</span><span class="attribute-value" id="value-wealth">0</span></div>
                    <div class="attribute-desc">影响教育资源、起跑线</div>
                    <div class="attribute-controls"><button class="btn-attr btn-minus" onclick="changeAttribute('wealth', -1)">−</button><button class="btn-attr btn-plus" onclick="changeAttribute('wealth', 1)">+</button></div>
                </div>
                <div class="attribute" data-attr="luck">
                    <div class="attribute-header"><span class="attribute-name">🍀 运气</span><span class="attribute-value" id="value-luck">0</span></div>
                    <div class="attribute-desc">影响意外事件、机遇</div>
                    <div class="attribute-controls"><button class="btn-attr btn-minus" onclick="changeAttribute('luck', -1)">−</button><button class="btn-attr btn-plus" onclick="changeAttribute('luck', 1)">+</button></div>
                </div>
            </div>
            <button class="btn-start" id="btn-start" onclick="startSimulation()">🚀 开始模拟</button>
            <div class="error-message" id="error-message"></div>
        </div>
        <div id="simulation-view">
            <div class="life-summary">
                <h2 id="life-title">🌟 人生旅程</h2>
                <p id="life-subtitle"></p>
                <div class="attributes-display" id="attributes-display"></div>
            </div>
            <div class="events-container" id="events-container"></div>
            <button class="btn-restart" onclick="restart()">🔄 再次重生</button>
        </div>
    </div>
    <script>
        let attributes = { iq: 0, eq: 0, physique: 0, looks: 0, wealth: 0, luck: 0 };
        let remainingPoints = 30;
        let characterName = '';
        
        const familyNames = ['张', '李', '王', '刘', '陈', '杨', '赵', '黄', '周', '吴', '徐', '孙', '胡', '朱', '高', '林', '何', '郭', '马', '罗'];
        const givenNames = ['明', '伟', '芳', '娜', '敏', '静', '强', '磊', '洋', '勇', '军', '杰', '娟', '涛', '明', '超', '秀', '霞', '平', '刚'];
        
        function changeAttribute(attr, delta) {
            const newValue = attributes[attr] + delta;
            if (newValue < 0 || newValue > 10) return;
            if (delta > 0 && remainingPoints <= 0) { showError('点数已用完！'); return; }
            attributes[attr] = newValue;
            remainingPoints -= delta;
            updateDisplay();
        }
        
        function updateDisplay() {
            document.getElementById('remaining-points').textContent = remainingPoints;
            for (let attr of Object.keys(attributes)) {
                document.getElementById(`value-${attr}`).textContent = attributes[attr];
            }
            document.getElementById('btn-start').disabled = remainingPoints > 0;
        }
        
        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 2000);
        }
        
        function startSimulation() {
            if (remainingPoints > 0) { showError('请分配完所有点数！'); return; }
            characterName = familyNames[Math.floor(Math.random() * familyNames.length)] + givenNames[Math.floor(Math.random() * givenNames.length)];
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('simulation-view').style.display = 'block';
            generateLife();
        }
        
        function generateLife() {
            const events = [];
            const params = calculateParams();
            const career = selectCareer(params);
            
            events.push(...generateChildhood(params));
            events.push(...generateSchool(params));
            events.push(...generateCollegeAndCareer(params, career));
            events.push(...generateMiddleAge(params, career));
            events.push(...generateOldAge(params));
            
            displayLife(events, params, career);
        }
        
        function calculateParams() {
            return {
                iq: attributes.iq,
                eq: attributes.eq,
                physique: attributes.physique,
                looks: attributes.looks,
                wealth: attributes.wealth,
                luck: attributes.luck,
                roll: (chance) => Math.random() < chance + attributes.luck * 0.03
            };
        }
        
        function selectCareer(params) {
            const careers = [];
            
            if (params.iq >= 8) careers.push({name: '科学家', weight: 30, type: 'intellectual'});
            if (params.iq >= 7 && params.eq >= 5) careers.push({name: '律师', weight: 25, type: 'professional'});
            if (params.iq >= 6 && params.wealth >= 6) careers.push({name: '医生', weight: 28, type: 'professional'});
            if (params.eq >= 7 && params.looks >= 6) careers.push({name: '演员', weight: 20, type: 'artistic'});
            if (params.iq >= 6 && params.luck >= 5) careers.push({name: '程序员', weight: 25, type: 'tech'});
            if (params.physique >= 8) careers.push({name: '职业运动员', weight: 22, type: 'physical'});
            if (params.physique >= 7 && params.iq >= 5) careers.push({name: '警官', weight: 20, type: 'service'});
            if (params.physique >= 6 && params.luck >= 6) careers.push({name: '雇佣兵', weight: 15, type: 'adventure'});
            if (params.looks >= 7 && params.eq >= 6) careers.push({name: '模特', weight: 18, type: 'artistic'});
            if (params.iq >= 5 && params.eq >= 7) careers.push({name: '销售经理', weight: 22, type: 'business'});
            if (params.wealth >= 7) careers.push({name: '企业家', weight: 25, type: 'business'});
            if (params.iq >= 6 && params.looks >= 5) careers.push({name: '主播', weight: 18, type: 'media'});
            if (params.physique >= 6 && params.looks >= 6) careers.push({name: '健身教练', weight: 16, type: 'physical'});
            
            if (careers.length === 0) {
                careers.push(
                    {name: '公务员', weight: 20, type: 'stable'},
                    {name: '教师', weight: 20, type: 'stable'},
                    {name: '销售员', weight: 20, type: 'business'},
                    {name: '厨师', weight: 18, type: 'creative'},
                    {name: '司机', weight: 15, type: 'service'}
                );
            }
            
            const totalWeight = careers.reduce((sum, c) => sum + c.weight, 0);
            let random = Math.random() * totalWeight;
            for (const career of careers) {
                random -= career.weight;
                if (random <= 0) return career;
            }
            return careers[0];
        }
        
        function generateChildhood(params) {
            const events = [];
            const birth = params.wealth >= 7 ? '富裕' : params.wealth >= 4 ? '普通' : '贫困';
            
            events.push({
                age: 0,
                content: `${characterName}出生了！出生在${birth}家庭。${params.wealth >= 7 ? '父母经商，从小衣食无忧。' : params.wealth <= 3 ? '父母是普通工人，生活拮据。' : '父母是工薪族，生活安稳。'}`,
                type: 'neutral'
            });
            
            if (params.physique >= 7) {
                events.push({
                    age: 5,
                    content: '5岁时展现出运动天赋，幼儿园运动会上你跑得比所有人都快。',
                    type: 'positive'
                });
            }
            
            if (params.iq >= 7) {
                events.push({
                    age: 6,
                    content: '小学一年级，你第一次考试就拿了满分。老师说你是个聪明的孩子。',
                    type: 'positive'
                });
            }
            
            if (params.looks >= 7) {
                events.push({
                    age: 10,
                    content: '你是学校里最好看的学生，经常收到同学的情书。',
                    type: 'positive'
                });
            }
            
            return events;
        }
        
        function generateSchool(params) {
            const events = [];
            
            events.push({
                age: 12,
                content: '小学毕业，最好的朋友哭着和你告别。你们答应要保持联系，但后来慢慢断了。',
                type: 'neutral'
            });
            
            const middleScore = params.iq + params.wealth * 0.5 + Math.random() * 2;
            if (middleScore >= 12) {
                events.push({
                    age: 15,
                    content: '考上了重点高中！父母为你骄傲，带你去吃大餐庆祝。',
                    type: 'positive'
                });
            } else {
                events.push({
                    age: 15,
                    content: '中考成绩一般，去了普通高中。你暗下决心要努力学习。',
                    type: 'neutral'
                });
            }
            
            const highScore = params.iq + params.wealth * 0.5 + params.luck * 0.3 + Math.random() * 2;
            if (highScore >= 14) {
                events.push({
                    age: 18,
                    content: `高考发挥出色，考了${580 + Math.floor(Math.random() * 50)}分！被985大学录取。全家人喜极而泣！`,
                    type: 'positive'
                });
            } else if (highScore >= 10) {
                events.push({
                    age: 18,
                    content: '高考成绩不错，考上了普通本科。虽然不是名校，但也算满意。',
                    type: 'neutral'
                });
            } else {
                events.push({
                    age: 18,
                    content: '高考失利，只能上专科。但你没有放弃，打算以后再努力。',
                    type: 'negative'
                });
            }
            
            return events;
        }

            const events = [];
            
            const careerStories = {

                ],
                '医生': [

                    {age: 28, content: '成为主治医师，开始独立诊治病人。', type: 'career'},

                ],
                '销售员': [
                    {age: 22, content: '做起了销售工作，每天奔波于各个客户之间。', type: 'neutral'},
                    {age: 28, content: '业绩时好时坏，收入不稳定，生活压力较大。', type: 'neutral'},
                    {age: 35, content: '熬成了老销售，有了稳定的客户群，生活好转。', type: 'positive'}
                ],
                '厨师': [
                    {age: 20, content: '拜师学艺，从打杂开始做起。', type: 'neutral'},
                    {age: 25, content: '获得厨师证，成为主厨。', type: 'career'},
                    {age: 32, content: '开了一家小餐馆，凭借好手艺生意兴隆。', type: 'positive'}
                ],
                '司机': [
                    {age: 22, content: '成为一名出租车司机，每天在城市里穿梭。', type: 'career'},
                    {age: 30, content: '网约车兴起后收入增加，生活有所改善。', type: 'neutral'},
                    {age: 40, content: '买了自己的车，开起了专车，收入稳定。', type: 'positive'}
                ]
            };
            
            const story = careerStories[career.name] || careerStories['教师'];
            story.forEach(s => events.push({...s}));
            
            return events;
        }
        
        function generateMiddleAge(params, career) {
            const events = [];
            
            if (params.roll(0.5)) {
                events.push({
                    age: 32,
                    content: '遇到了相伴一生的人，你们结婚了。',
                    type: 'positive'
                });
                
                events.push({
                    age: 34,
                    content: '孩子出生了，初为人父母的你感到无比幸福。',
                    type: 'positive'
                });
            }
            
            if (params.roll(0.3) && career.type !== 'adventure') {
                events.push({
                    age: 40,
                    content: '40岁那年，公司裁员，你失业了。找工作四处碰壁，生活陷入困境。',
                    type: 'negative'
                });
                
                events.push({
                    age: 42,
                    content: '不甘心沉沦，你开始重新学习技能，终于找到了新的工作。',
                    type: 'positive'
                });
            }
            
            if (params.roll(0.4)) {
                events.push({
                    age: 48,
                    content: '父亲/母亲因病去世。你第一次真切地感受到生命的脆弱。',
                    type: 'negative'
                });
            }
            
            return events;
        }
        
        function generateOldAge(params) {
            const events = [];
            
            events.push({
                age: 55,
                content: '55岁，退休了。不用再上班，你反而不知道该干什么。',
                type: 'neutral'
            });
            
            if (params.physique >= 6) {
                events.push({
                    age: 65,
                    content: '身体还硬朗，经常和老友一起旅游，年轻时没去过的地方现在都去了。',
                    type: 'positive'
                });
            }
            
            if (params.roll(0.5)) {
                events.push({
                    age: 70,
                    content: '孙子/孙女出生了，你每天帮忙带孩子，忙碌但快乐。',
                    type: 'positive'
                });
            }
            
            let deathAge = 75 + Math.floor(Math.random() * 15);
            if (params.physique >= 8) deathAge += 10;
            if (params.wealth >= 7) deathAge += 5;
            if (params.physique <= 3) deathAge -= 10;
            
            const deathWays = [
                '在睡梦中安详离世，没有痛苦。',
                '突发心脏病，走得很突然。',
                '因病去世，子女们陪伴在身边。',
                '在公园晨练时倒下，医生说走得很安详。',
                '临终前说："这辈子，我没有遗憾。"'
            ];
            
            events.push({
                age: deathAge,
                content: deathWays[Math.floor(Math.random() * deathWays.length)],
                type: 'death'
            });
            
            return events;
        }
        
        function displayLife(events, params, career) {
            const title = document.getElementById('life-title');
            const subtitle = document.getElementById('life-subtitle');
            const attrsDisplay = document.getElementById('attributes-display');
            
            const total = Object.values(attributes).reduce((a, b) => a + b, 0);
            if (total >= 50) {
                title.textContent = '👑 传奇人生';
            } else if (total >= 40) {
                title.textContent = '✨ 精彩人生';
            } else if (total >= 30) {
                title.textContent = '📖 普通人生';
            } else {
                title.textContent = '💭 坎坷人生';
            }
            
            subtitle.textContent = `${characterName}是一名${career.name}，${career.type === 'adventure' ? '充满冒险' : '平凡而真实'}的一生。`;
            
            attrsDisplay.innerHTML = Object.entries(attributes).map(([k, v]) => 
                `<span class="attr-tag">${['🧠','❤️','💪','✨','💰','🍀'][Object.keys(attributes).indexOf(k)]} ${k}: ${v}</span>`
            ).join('');
            
            const container = document.getElementById('events-container');
            container.innerHTML = events.map(e => 
                `<div class="event ${e.type}"><div class="age">${e.age}岁</div>${e.content}</div>`
            ).join('');
            container.scrollTop = 0;
        }
        
        function restart() {
            attributes = { iq: 0, eq: 0, physique: 0, looks: 0, wealth: 0, luck: 0 };
            remainingPoints = 30;
            updateDisplay();
            document.getElementById('simulation-view').style.display = 'none';
            document.getElementById('setup-view').style.display = 'block';
        }
    </script>
</body>
</html>
